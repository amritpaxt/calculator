<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ CaLc - The Funky Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <header class="header">
            <h1>✨ CaLc</h1>
            <p class="tagline">the most unhinged calculator ever fr fr</p>
            <button class="upgrade-btn" onclick="redirectToSubscription()">🚀 Unlock Pro</button>
        </header>

        <div class="calculator-wrapper">
            <div class="calculator">
                <div class="display">
                    <span id="displayValue" class="display-value">0</span>
                    <span id="operation" class="operation-display"></span>
                </div>
                
                <div class="buttons-grid">
                    <button class="btn btn-light" onclick="clearDisplay()">AC</button>
                    <button class="btn btn-light" onclick="deleteLast()">←</button>
                    <button class="btn btn-light" onclick="inputNumber('.')">.</button>
                    <button class="btn btn-primary" onclick="setOperation('add')">+</button>

                    <button class="btn btn-num" onclick="inputNumber('7')">7</button>
                    <button class="btn btn-num" onclick="inputNumber('8')">8</button>
                    <button class="btn btn-num" onclick="inputNumber('9')">9</button>
                    <button class="btn btn-secondary" onclick="setOperation('subtract')">−</button>

                    <button class="btn btn-num" onclick="inputNumber('4')">4</button>
                    <button class="btn btn-num" onclick="inputNumber('5')">5</button>
                    <button class="btn btn-num" onclick="inputNumber('6')">6</button>
                    <button class="btn btn-tertiary" onclick="setOperation('multiply')">×</button>

                    <button class="btn btn-num" onclick="inputNumber('1')">1</button>
                    <button class="btn btn-num" onclick="inputNumber('2')">2</button>
                    <button class="btn btn-num" onclick="inputNumber('3')">3</button>
                    <button class="btn btn-num" onclick="inputNumber('0')" style="grid-column: span 1;">0</button>

                    <button class="btn btn-num" onclick="inputNumber('00')" style="grid-column: span 1;">00</button>
                    <button class="btn btn-equals" onclick="calculate()" style="grid-column: span 2;">=</button>
                </div>
            </div>

            <div class="vibes-box">
                <h3>✨ no cap calculator tbh</h3>
                <p>just vibes, no premium features locked. everything's already unlocked kings/queens</p>
                <p class="small-text">but fr fr check out pro for... idk more features or smth lol</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
